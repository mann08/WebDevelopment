<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cravings</title>
    <link
      class=""
      rel="icon"
      type="image/png"
      href="../assets/images/craveing logo.png"
    />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar-custom sticky-top">
      <div class="px-2 px-sm-3 px-md-4 px-lg-5 py-1">
        <div class="d-flex justify-content-between align-items-center">
          <!-- Logo -->
          <a href="index.html" class="d-flex align-items-center flex-shrink-0">
            <img
              id="logoimg"
              src="../assets/images/craveing logo.png"
              class=""
              alt="logo"
            />
          </a>

          <!-- Buttons -->
          <div class="d-flex align-items-center gap-2 mt-2 mt-sm-0">
            <a
              id="Login"
              class="btn px-3 w-100 w-sm-auto"
              href="../pages/login.html"
            >
              Login
            </a>
            <a id="Register" class="btn px-3 w-100 w-sm-auto" href="../pages/register.html">
              Register
            </a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Register Section -->
    <!-- ===================== ACCESS DENIED SECTION START ===================== -->
    <section
      class="custom-section position-relative d-flex align-items-center justify-content-center text-center"
    >
      <!-- Background Image -->
      <img
        src="../assets/images/foodTable.webp"
        class="w-100 h-100 object-fit-cover position-absolute top-0 start-0 "
        alt="bg"
      />

      <!-- Overlay -->
      <div class="overlay position-absolute top-0 start-0 w-100 h-100"></div>

      <!-- Content -->
      <div class="container position-relative">
        <h4 class="fw-bolder text-white mb-3">
          Access Denied. Please log in as an restaurant manager to view this
          page.
        </h4>

        <a href="login.html" class="btn btn-custom px-4 py-2"> Go to Login </a>
      </div>
    </section>
    <!-- ===================== ACCESS DENIED SECTION END ===================== -->

    <!-- ===== FOOTER ===== -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
