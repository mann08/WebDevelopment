<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Register</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-primary d-flex justify-content-center align-items-center vh-100"
  >
    <div class="container">
      <div class="row justify-content-end align-items-end">
        <div
          class="col-md-5 bg-white rounded p-4 m-3 d-flex flex-column justify-content-between"
          style="height: 550px; width: 500px"
        >
          <h3 class="mb-4">
            <span class="text-decoration-underline text-primary">Lo</span>gin
          </h3>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-envelope"></i>
            </span>
            <input
              type="email"
              class="form-control border-0"
              placeholder="Enter your email"
            />
          </div>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              class="form-control border-0"
              placeholder="Confirm a password"
            />
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-eye"></i>
            </span>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <input type="checkbox" />
              <span class="text-muted">Remember me</span>
            </div>
            <span class="text-primary">Forgot password?</span>
          </div>

          <button class="btn btn-primary w-100 mb-3">Login Now</button>

          <p class="text-center text-muted">
            Don't have an account?
            <span class="text-primary">Signup now</span>
          </p>
        </div>

        <div
          class="col-md-5 bg-white rounded p-4 m-3 d-flex flex-column justify-content-between"
          style="height: 650px; width: 500px"
        >
          <h3 class="mb-4">
            <span class="text-decoration-underline text-primary">Re</span
            >gistration
          </h3>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-person"></i>
            </span>
            <input
              type="text"
              class="form-control border-0"
              placeholder="Enter your name"
            />
          </div>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-envelope"></i>
            </span>
            <input
              type="email"
              class="form-control border-0"
              placeholder="Enter your email"
            />
          </div>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              class="form-control border-0"
              placeholder="Create a password"
            />
          </div>

          <div class="input-group mb-3 border-bottom">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              class="form-control border-0"
              placeholder="Confirm a password"
            />
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-eye"></i>
            </span>
          </div>

          <div class="mb-3">
            <input type="checkbox" />
            <span class="text-muted">I accept all terms & conditions</span>
          </div>

          <button class="btn btn-primary w-100 mb-3">Register Now</button>

          <p class="text-center text-muted">
            Already have an account?
            <span class="text-primary">Login now</span>
          </p>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
