<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylish Card</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6a6a, #ffd86f, #6aff8d);
        animation: bgAnimation 8s infinite alternate;
      }

      @keyframes bgAnimation {
        0% {
          background: linear-gradient(135deg, #ff6a6a, #ffd86f, #6aff8d);
        }
        100% {
          background: linear-gradient(135deg, #6aff8d, #6adfff, #d96aff);
        }
      }

      #abcd {
        width: 320px;
        height: 200px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        font-weight: 600;
        color: #fff;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.3);

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);

        transition: 0.4s;
      }

      #abcd:hover {
        transform: scale(1.1) rotate(2deg);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      span {
        background: linear-gradient(45deg, #fff, #ffe600);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="abcd">Hey! <span>Mann 🚀</span></div>
  </body>
</html>
