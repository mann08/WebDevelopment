<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table border="2" cellpadding="3">
        <tr>
          <th colspan="4"><h2>Registration Form</h2></th>
        </tr>
        <tr>
          <td>Student Name</td>
          <td>
            <input type="text" name="studentName" placeholder="First Name" />
          </td>
          <td>
            <input type="text" name="studentName" placeholder="Middle Name" />
          </td>
          <td>
            <input type="text" name="studentName" placeholder="Last Name" />
          </td>
        </tr>
        <tr>
          <td>Father's Name</td>
          <td>
            <input type="text" name="fathersName" placeholder="Father's Name" />
          </td>
          <td>Mother's Name</td>
          <td>
            <input type="text" name="mothersName" placeholder="Mother's Name" />
          </td>
        </tr>
        <tr>
          <td>Date of Birth</td>
          <td><input type="date" name="dob" /></td>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender" value="male" /> Male
            <input type="radio" name="gender" value="female" /> Female
          </td>
        </tr>
        <tr>
          <td>Category</td>
          <td>
            <input type="radio" name="category" value="general" /> Gen
            <input type="radio" name="category" value="obc" /> OBC
            <input type="radio" name="category" value="sc" /> SC/ST
          </td>
          <td>Handicapped</td>
          <td>
            Yes<input type="radio" name="handicapped" value="yes" /> No
            <input type="radio" name="handicapped" value="no" />
          </td>
        </tr>

        <tr>
          <td>Ex-Serviceman</td>
          <td>
            <input type="radio" name="exServiceman" value="yes" /> Yes
            <input type="radio" name="exServiceman" value="no" /> No
          </td>
          <td>EWS</td>
          <td>
            <input type="radio" name="ews" value="yes" /> Yes
            <input type="radio" name="ews" value="no" /> No
          </td>
        </tr>
        <tr>
          <td>Email:</td>
          <td><input type="email" name="email" placeholder="Email" /></td>
          <td>Mobile No:</td>
          <td><input type="number" name="mobile" placeholder="Mobile No" /></td>
        </tr>
        <tr>
          <td>State:</td>
          <td>
            <select name="state" id="state">
              <option value="">Select State</option>
              <option value="Madhya Pradesh">Madhya Pradesh</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
            </select>
          </td>
          <td>
            <label for="city">City:</label>
          </td>
          <td>
            <select name="city" id="city">
              <option value="">Select City</option>
              <option value="Indore">Indore</option>
              <option value="Bhopal">Bhopal</option>
              <option value="Gwalior">Gwalior</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><label for="Upload File">Upload Photo</label></td>
          <td><input type="file" name="uploadFile" id="Upload File" /></td>
          <td><label for="Upload Signature">Upload Signature</label></td>
          <td>
            <input type="file" name="uploadSignature" id="Upload Signature" />
          </td>
        </tr>
        <tr>
          <td></td>
          <th colspan="3"><input type="submit" value="Submit" /></th>
        </tr>
      </table>
    </form>
      <a href="./index.html">Back to Previous Page</a>
    <br>
    <a href="../../index.html">Back to Home </a>
  </body>
</html>
