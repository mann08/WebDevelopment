<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <h3>Farewell Party Survey Form</h3>

        <label>Name:</label>
        <input type="text" id="Name" name="Name" value="Enter your name" />
        <br /><br />
        <label>Email:</label>
        <input type="email" id="Email" name="Email" value="Enter your email" />
        <br /><br />
        <label>Age:</label>
        <input type="text" id="Age" name="Age" value="Enter your age" />
        <br /><br />
        <label> Which option best describes you></label>
        <select name="Option" id="Option">
          <option value="Student">Student</option>
          <option value="Employee">Employee</option>
          <option value="Retired">Retired</option>
          <option value="Other">Other</option>
        </select>
        <br /><br />
        <label>Will you attend the party?</label>
        <input type="checkbox" id="Attend" name="Attend" />
        <label>Yes </label>
        <input type="checkbox" id="NotAttend" name="NotAttend" />
        <label>No </label>
        <br /><br />
        <label>What did you like about the program?</label>
        <br />
        <input type="checkbox" id="Training" name="Training" />
        <label>Training</label>
        <br />
        <input
          type="checkbox"
          id="The Learning Sessions from Industry Experts"
          name="The Learning Sessions from Industry Experts"
        />
        <label>The Learning Sessions from Industry Experts</label>
        <br />
        <input
          type="checkbox"
          id="Community Meetups"
          name="Community Meetups"
        />
        <label>Community Meetups</label>
        <br />
        <input
          type="checkbox"
          id="Brown Bag Sessions"
          name="Brown Bag Sessions"
        />
        <label>Brown Bag Sessions</label>
        <br />
        <input
          type="checkbox"
          id="Switching to Hybrid Mode"
          name="Switching to Hybrid Mode"
        />
        <label>Switching to Hybrid Mode</label>
        <br />
        <input type="checkbox" id="Food, Office etc." name="Other" />
        <label>Food, Office etc.</label>
        <br /><br />
        <label>Any suggestions for improvement?</label>
        <textarea
          name="Suggestions"
          id="Suggestions"
          placeholder="Enter your suggestions here..."
        ></textarea>

        <br /><br />
        <input type="reset" value="Reset" />
        <input type="submit" value="Submit" />
      </fieldset>
    </form>
  </body>
</html>
