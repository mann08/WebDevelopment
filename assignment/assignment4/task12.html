<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table width="1000">
      <form>
        <tr>
          <td>
            <img
              src="./doctor.webp"
              alt="Doctor Image"
              width="300"
              height="400"
            />
          </td>
          <h1>Doctor Appointment Form</h1>
          <hr color="red" />
          <td>
            <label for="Appointment date">Appointment Date:</label>
            <input type="date" id="Appointment date" name="appointmentDate" />
            <br />
            <br />
            <label for="Appointment time">Appointment Time:</label>
            <input type="time" id="Appointment time" name="appointmentTime" />
            <br />
            <br />
            <label for="Name">Name:</label>
            <input type="text" id="Name" name="name" placeholder="First" />
            <input type="text" name="lastName" placeholder="Last" />
            <br />
            <br />
            <label for="Gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male" />
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female">Female</label>
            <br />
            <br />
            <label for="Phone">Phone:</label>
            <input type="tel" id="Phone" name="phone" />
            <br />
            <br />
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="city" />
            <input type="text" name="state" placeholder="state" />
            <br />
            <br />
            <label for="Query">Your Query:</label>
            <textarea
              id="Query"
              name="query"
              placeholder="Please describe your issue..."
            ></textarea>
            <br />
            <br />
            <label for="Appointment Type">Appointment Type:</label>
            Select which appointment type you want to book: <br />
            <input
              type="checkbox"
              id="Cervic Check-up"
              name="appointmentType"
              value="checkup"
            />
            <label for="Cervic Check-up">Cervic Check-up</label>
            <br />
            <input
              type="checkbox"
              id="Heart Check-up"
              name="appointmentType"
              value="consultation"
            />
            <label for="Heart Check-up">Heart Check-up</label>
            <br />
            <input
              type="checkbox"
              id="Eye Check-up"
              name="appointmentType"
              value="followup"
            />
            <label for="Eye Check-up">Eye Check-up</label>
            <br />
            <input
              type="checkbox"
              id="Hearing test"
              name="appointmentType"
              value="followup"
            />
            <label for="Hearing test">Hearing Test</label>
            <br />
            <br />
            <input type="submit" id="Send" name="Send" value="Send" />
          </td>
        </tr>
      </form>
    </table>
     <a href="./index.html">Back to Previous Page</a>
    <br>
    <a href="../../index.html">Back to Home </a>
  </body>
</html>
