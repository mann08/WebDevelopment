<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <h2>Pizza Order Form</h2>
        <b>
          <label for="First Name">First Name:</label>
          <input type="text" id="First Name" name="First Name" required />
          <br /><br />
          <label for="Last Name">Last Name:</label>
          <input type="text" id="Last Name" name="Last Name" required />
          <br /><br />
          <label for="Email Address">Email Address:</label>
          <input
            type="email"
            id="Email Address"
            name="Email Address"
            required
          />
          <br /><br />
          <label for="Contact Number">Contact Number:</label>
          <input
            type="tel"
            id="Contact Number"
            name="Contact Number"
            required
          />
          <br /><br />
          <label for="Pizza Size">Pizza Size:</label>
          <br />
          <input
            type="radio"
            id="Small"
            name="Pizza Size"
            value="Small"
            required
          />
          <label for="Small">Small</label>
          <input
            type="radio"
            id="Medium"
            name="Pizza Size"
            value="Medium"
            required
          />
          <label for="Medium">Medium</label>
          <input
            type="radio"
            id="Large"
            name="Pizza Size"
            value="Large"
            required
          />
          <label for="Large">Large</label>
          <br /><br />
          <label for="Flavor">Flavor:</label>
          <br />
          <input type="checkbox" id="Hawaian" name="Flavor" value="Hawaian" />
          <label for="Hawaian">Hawaian</label>
          <input
            type="number"
            name="Flavor Quantity"
            id="Flavor Quantity"
            min="1"
            value="1"
          />

          <br />
          <input
            type="checkbox"
            id="Pepperoni"
            name="Flavor"
            value="Pepperoni"
          />
          <label for="Pepperoni">Pepperoni</label>
          <input
            type="number"
            name="Flavor Quantity"
            id="Flavor Quantity"
            min="1"
            value="1"
          />
          <br />
          <input type="checkbox" id="Vegetable" name="Flavor" value="Veggie" />
          <label for="Vegetable">Vegetable</label>
          <input
            type="number"
            name="Flavor Quantity"
            id="Flavor Quantity"
            min="1"
            value="1"
          />
          <br /><br />
          <label for="Credit Card Number">Credit Card Number:</label>
          <input
            type="text"
            id="Credit Card Number"
            name="Credit Card Number"
            required
          />
          <br /><br />
          <label for="PIN">PIN:</label>
          <input type="text" id="PIN" name="PIN" required />
          <br /><br />
          <label for="Additional Note">Additional Note:</label>
          <br />
          <textarea id="Additional Note" name="Additional Note"></textarea>
          <br />
          <br />
          <input type="submit" value="Submit Order" />
        </b>
      </fieldset>
    </form>
       <a href="./index.html">Back to Previous Page</a>
    <br>
    <a href="../../index.html">Back to Home </a>
  </body>
</html>
