<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <h3>Application Form </h3>
    <label>First Name:</label>
    <input type="text" id="Firstname" name="Firstname" >
    <label>Last Name:</label>
    <input type="text" id="Lastname" name="Lastname" >
    <br><br>    
    <label>Date of Birth:</label>
    <input type="date" id="DateOfBirth" name="DateOfBirth" >
    <label>Age:</label>
    <select name ="Age" id="Age">
        <option value="">Select Age</option>
        <option value="18-25">18-25</option>
        <option value="26-35">26-35</option>
        <option value="36-45">36-45</option>
        <option value="46-55">46-55</option>
        <option value="56+">56+</option>
    </select>
    <br><br
    <label>Gender:</label>
    <select name="Gender" id="Gender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>
    <label>Email:</label>
    <input type="email" id="Email" name="Email">
    <br><br>
    <label>Position Available:</label>
    <input type="radio" id="Junior Developer" name="Junior Developer" >
    <label >Junior Developer</label>
    <input type="radio" id="Mid-level Developer" name="Mid-level Developer" >
    <label >Mid-level Developer</label>
    <input type="radio" id="Senior Developer" name="Senior Developer" >
    <label >Senior Developer</label>
    <br><br>
    <label> Programming Languages:</label>
    <input type="checkbox" id="Java" name="ProgrammingLanguages">
    <label >Java</label>
    <input type="checkbox" id="Python" name="ProgrammingLanguages">
    <label >Python</label>
    <input type="checkbox" id="JavaScript" name="ProgrammingLanguages">
    <label >JavaScript</label>
    <br><br>
    <label> Password:</label>
    <input type="password" id="Password" name="Password">
    <label>Confirm Password:</label>
    <input type="password" id="ConfirmPassword" name="ConfirmPassword">
    
    <br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    </form>
</body>
</html>
