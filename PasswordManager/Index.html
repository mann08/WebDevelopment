<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body class="bg-dark text-light">
    <header class="bg-primary text-light p-3 text-center">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Password Manager</h2>
        <div class="d-flex gap-5">
          <a href="Index.html" class="text-decoration-none text-white"
            >Add New Password</a
          >
          <a href="showPassword.html" class="text-decoration-none text-white">Saved Password</a>
        </div>
      </div>
    </header>

    <main>
      <div class="w-50 mx-auto rounded border p-3 mt-4">
        <form class="d-grid gap-3" id="passFrom">
          <input
            type="text"
            name="siteName"
            id="siteName"
            placeholder="Enter the Website Name"
            class="form-control"
          />
          <input
            type="text"
            name="userName"
            id="userName"
            placeholder="Enter the User Name"
            class="form-control"
          />
          <input
            type="text"
            name="password"
            id="password"
            placeholder="Enter the Website Name"
            class="form-control"
          />
          <div>
            <button type="submit" class="btn btn-outline-primary">Save</button>
            <button type="reset" class="btn btn-outline-primary">Cancel</button>
          </div>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="Script.js"></script>
  </body>
</html>
