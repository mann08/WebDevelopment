<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Salary Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
              <h4 class="mb-0"> 💰 Salary Calculator</h4>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="basicInput" class="form-label"
                  >Basic Salary (₹)</label
                >
                <input
                  type="number"
                  id="basicInput"
                  class="form-control"
                  placeholder="Enter basic amount"
                />
                <div
                  id="errorMsg"
                  class="text-danger small mt-1"
                  style="display: none"
                >
                  Invalid Input! Please enter a positive number.
                </div>
              </div>

              <div class="d-flex gap-2">
                <button id="calcBtn" class="btn btn-primary w-100">
                  <span
                    id="spinner"
                    class="spinner-border spinner-border-sm d-none"
                  ></span>
                  Calculate Gross Salary
                </button>
                <button id="resetBtn" class="btn btn-outline-secondary">
                  Reset
                </button>
              </div>

              <div
                id="resultArea"
                class="mt-4 p-3 border rounded bg-light"
                style="display: none"
              >
                <h5 class="text-success text-center mb-3">
                  Calculation Successful!
                </h5>
                <div class="d-flex justify-content-between mb-2">
                  <span>Basic Salary:</span>
                  <strong id="resBasic">₹0.00</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span>HRA (20%):</span>
                  <strong id="resHRA">₹0.00</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span>DA (50%):</span>
                  <strong id="resDA">₹0.00</strong>
                </div>
                <hr />
                <div class="d-flex justify-content-between h5 text-primary">
                  <span>Gross Salary:</span>
                  <strong id="resGross">₹0.00</strong>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="Script.js"></script>
  </body>
</html>
