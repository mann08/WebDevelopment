<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <img src="" alt="">
  </head>
  <body>
    
    <main class="container">
      <section class="converter-card">
        <div class="top-content">
          <div class="icon-box">
            <i class="bi bi-currency-exchange"></i>
          </div>
          <h1>Currency Converter</h1>
          <p>Convert currencies using live exchange rates</p>
        </div>

        <div class="input-group">
          <label for="orgAmount">Amount</label>
          <input type="number" id="orgAmount" placeholder="Enter amount" />
          <small id="amountError"></small>
        </div>

        <div class="currency-row">
          <div class="currency-box">
            <label for="country1">From Country</label>
            <div class="flag-box">
              <img id="flag1" alt="From Flag" />
            </div>
            <select id="country1">
              <option value="">Select Country</option>
            </select>
            <small id="fromError"></small>
          </div>

          <button id="swapBtn" class="swap-btn">
            <i class="bi bi-arrow-left-right"></i>
          </button>

          <div class="currency-box">
            <label for="country2">To Country</label>
            <div class="flag-box">
              <img id="flag2" alt="To Flag" />
            </div>
            <select id="country2">
              <option value="">Select Country</option>
            </select>
            <small id="toError"></small>
          </div>
        </div>

        <button id="convertBtn" class="convert-btn">Convert</button>

        <div class="result-box">
          <p id="newAmount">Converted amount will appear here</p>
          <span id="rateInfo"></span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
