<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <header>
      <div class="bg-primary p-3">
        <div>Institute Registration form</div>
      </div>
    </header>
    <main>
      <form>
        <section>
          <div class="container mt-4 p-5 bg-light rounded border shadow mt">
            <div class="container mt-4 p-5 bg-light rounded border shadow mt">
              <div class="p-2">
                <label for="name">Enter Your Name </label>
                <input
                  type="text"
                  id="fullName"
                  placeholder="Enter Your Name"
                  class="form-control"
                />
                <span id="fullNameError" class="text-danger small"></span>
              </div>
              <div class="p-2">
                <label for="Email">Enter Your Email </label>
                <input
                  type="text"
                  id="email"
                  placeholder="Enter Your Email"
                  class="form-control"
                />
                <span id="emailError" class="error"></span>
              </div>
              <div class="p-2">
                <label for="number">Enter your Phone number </label>
                <input
                  type="text"
                  id="phone"
                  placeholder="Enter Your Phone Number"
                  class="form-control"
                />
                <span id="phoneError" class="error"></span>
              </div>

              <div class="p-2">
                <label for="DOB"> Date Of Birth </label>
                <input
                  type="text"
                  id="DOB"
                  placeholder="Enter Your Date Of Birth"
                  class="form-control"
                />
                <span id="DOBError"></span>
              </div>
            </div>
            <div class="container mt-4 p-5 bg-light rounded border shadow mt">
              <div>
                <label>Last Completed Qualification*</label>
                <select id="qualification" class="form-control">
                  <option value="">Select Qualification</option>
                  <option value="10th">10th</option>
                  <option value="12th">12th</option>
                  <option value="Graduate">Graduate</option>
                  <option value="Postgraduate">Postgraduate</option>
                </select>
                <span class="error" id="qualError"></span>
              </div>
              <div class="form-group">
                <label>Percentage/Grade*</label>
                <input
                  type="text"
                  id="grade"
                  placeholder="95 or A"
                  class="form-control"
                />
                <span class="error" id="gradeError"></span>
              </div>
            </div>
            <div class="container mt-4 p-5 bg-light rounded border shadow mt">
              <div class="form-group">
                <label>Preferred Course*</label>
                <select id="course" class="form-control">
                  <option value="">Select Course</option>
                  <option value="IIT-JEE">IIT-JEE</option>
                  <option value="NEET">NEET</option>
                  <option value="Banking">Banking Exams</option>
                  <option value="UPSC">UPSC</option>
                </select>
                <span class="error" id="courseError"></span>
              </div>
              <div class="form-group">
                <label>Batch Timing*</label>
                <select id="timing" class="form-control">
                  <option value="">Select Timing</option>
                  <option value="Morning">Morning</option>
                  <option value="Afternoon">Afternoon</option>
                  <option value="Evening">Evening</option>
                  <option value="Weekend">Weekend</option>
                </select>
                <span class="error" id="timingError"></span>
              </div>
            </div>
            <div class="container mt-4 p-5 bg-light rounded border shadow mt">
              <div class="form-group">
                <label>Residential Address*</label>
                <textarea id="address" rows="3" class="form-control"></textarea>
                <span class="error" id="addressError"></span>
              </div>
              <div class="form-group">
                <label>City*</label>
                <input type="text" id="city" />
                <span class="error" id="cityError"></span>
              </div>
              <div class="form-group">
                <label>Pin Code*</label>
                <input type="text" id="pincode" maxlength="6" />
                <span class="error" id="pinError"></span>
              </div>
            </div>
          </div>
        </section>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="Script.js"></script>
  </body>
</html>
