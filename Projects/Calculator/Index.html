<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Calculator</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>

    <div class="page-shell">
      <div class="calculator-card">
        <div class="calculator-screen" id="display">
            <label for="Text" class="fs-2 border">0</label>
        </div>

        <div class="calculator-keypad">
          <button class="key" id="clear">AC</button>
          <button class="key" id="cancel">C</button>
          <button class="key" data-value="%">%</button>
          <button class="key key-operator" data-value="/">/</button>

          <button class="key" data-value="7">7</button>
          <button class="key" data-value="8">8</button>
          <button class="key" data-value="9">9</button>
          <button class="key key-operator" data-value="*">*</button>

          <button class="key" data-value="4">4</button>
          <button class="key" data-value="5">5</button>
          <button class="key" data-value="6">6</button>
          <button class="key key-operator" data-value="-">-</button>

          <button class="key" data-value="1">1</button>
          <button class="key" data-value="2">2</button>
          <button class="key" data-value="3">3</button>
          <button class="key key-operator" data-value="+">+</button>

          <button class="key" data-value="0">0</button>
          <button class="key" data-value=".">.</button>
          <button class="key key-equal" id="equal">=</button>
        </div>
    </div>
    </div>

    <script src="Script.js"></script>
  </body>
</html>
