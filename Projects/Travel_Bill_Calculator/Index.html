<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Bill Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
              <h2 class="text-center mb-4 text-primary">
                🚖 Travel Bill Calculator
              </h2>

              <div class="mb-3">
                <label for="kmInput" class="form-label fw-bold"
                  >Kilometers Covered</label
                >
                <input
                  type="number"
                  step="0.1"
                  id="kmInput"
                  class="form-control form-control-lg"
                  placeholder="Enter distance (e.g. 50.5)"
                />
                <div id="validationFeedback" class="invalid-feedback">
                  Please enter a non-negative number of kilometres.
                </div>
              </div>

              <div class="d-grid mb-4">
                <button
                  id="calculateBtn"
                  class="btn btn-primary btn-lg shadow-sm"
                >
                  Calculate Bill
                </button>
              </div>

              <div id="outputSection" class="d-none">
                <div class="alert alert-success text-center">
                  <h3 class="mb-0">
                    Total Bill = <span id="totalDisplay">Rs. 0</span>
                  </h3>
                </div>

                <h5 class="mt-4 border-bottom pb-2">Calculation Breakdown:</h5>
                <div
                  id="breakdownList"
                  class="list-group list-group-flush"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
