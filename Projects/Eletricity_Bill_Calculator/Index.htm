<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Bill Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card calculator-card p-4 mb-4">
            <h2 class="text-center mb-4">⚡ Electricity Bill Calculator</h2>
            <div class="mb-3">
              <label for="unitsInput" class="form-label fw-bold"
                >Enter Electricity Units Consumed:</label
              >
              <input
                type="number"
                id="unitsInput"
                class="form-control form-control-lg"
                placeholder="e.g. 500"
                min="0"
              />
            </div>
            <div class="d-flex gap-3 justify-content-center">
              <button
                id="calculateBtn"
                class="btn btn-calculate text-white px-5 py-2"
              >
                Calculate
              </button>
              <button id="resetBtn" class="btn btn-outline-danger px-5 py-2">
                Reset
              </button>
            </div>
          </div>

          <div
            id="resultArea"
            class="card calculator-card result-card p-4"
            style="display: none"
          >
            <h4 class="border-bottom pb-2 mb-3">Bill Details</h4>
            <div id="slabBreakdown"></div>

            <div class="mt-3 p-3 bg-light rounded">
              <div class="d-flex justify-content-between">
                <span>Subtotal (Before Surcharge)</span>
                <strong id="subtotalVal">₹0.00</strong>
              </div>
              <div class="d-flex justify-content-between text-muted">
                <span>Surcharge (20%)</span>
                <span id="surchargeVal">₹0.00</span>
              </div>
              <hr />
              <div class="d-flex justify-content-between total-highlight">
                <span class="h5 mb-0">Grand Total</span>
                <span class="h5 mb-0" id="grandTotalVal">₹0.00</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="Script.js"></script>
  </body>
</html>
