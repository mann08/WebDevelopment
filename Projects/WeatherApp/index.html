<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark">
    <header class="bg-primary text-light p-2 text-center">
      <h3>Mausam k hal 😊😂😁</h3>
    </header>
    <main class="container mt-4">
      <div class="row">
        <div class="col-md-6 mx-auto">
          <div class="card bg-light">
            <div class="card-body">
              <h5 class="card-title">Weather App</h5>
              <input
                type="text"
                class="form-control"
                id="cityName"
                placeholder="Enter city name"
              />
              <button class="btn btn-primary mt-2" onclick="getWeather()">
                Get Weather
              </button>
            </div>
            <div>
              <label class="text-primary d-flex justify-content-center">
                City: <span id="city"> Your City </span></label
              >
              <br />
              <label class="text-primary d-flex justify-content-center">
                Temp: <span id="temperature" > 30 </span> °C </label
              >
              <br />
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="script.js"></script>
  </body>
</html>
